name: Supabase Keepalive

on:
  schedule:
    # Every 6 days at 03:00 UTC (= 12:00 JST) — before the 7-day inactivity threshold
    - cron: '0 3 */6 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: https://gothqgwtucnyrsblzawo.supabase.co
          SUPABASE_ANON_KEY: sb_publishable__ZbHNUh0qWESSAvwkdPyJA_zE4ktsay
        run: |
          echo "Pinging Supabase project to prevent auto-pause..."
          CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/")
          echo "HTTP status: $CODE"
          head -c 200 /tmp/resp.txt || true
          echo ""
          if [ "$CODE" = "200" ] || [ "$CODE" = "404" ] || [ "$CODE" = "401" ]; then
            echo "Project is active (got HTTP $CODE)"
            exit 0
          else
            echo "Unexpected status; project may be paused"
            exit 1
          fi
