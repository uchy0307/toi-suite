    <script>
      // バージョン強制更新スクリプト: 古いSW/キャッシュが残っていたら一度だけ全消去してリロード
      (function() {
        var APP_VERSION = "v3-2026-05-06";
        var stored = localStorage.getItem("toi_app_version");
        if (stored !== APP_VERSION) {
          localStorage.setItem("toi_app_version", APP_VERSION);
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
              if (window.caches) {
                caches.keys().then(function(keys) {
                  Promise.all(keys.map(function(k) { return caches.delete(k); })).then(function() {
                    if (stored) { window.location.reload(); }
                  });
                });
              }
            }).catch(function() {});
          }
        }
      })();
    </script>
